name: Build Plugin
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Find pom and build
        run: |
          POM_DIR=$(dirname "$(find . -name pom.xml | head -1)")
          echo "Building in: $POM_DIR"
          cd "$POM_DIR"
          mvn clean package
          echo "=== Built jars ==="
          ls -la target/
      - uses: actions/upload-artifact@v4
        with:
          name: MaceLock-plugin
          path: '**/target/*.jar'
        
