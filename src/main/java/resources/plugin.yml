name: MaceLock
version: 1.0.0
main: com.yourserver.macelock.MaceLock
api-version: '1.21'
author: YourServer
description: Blocks maces from being enchanted via anvil or enchanting table, except by staff.

permissions:
  kephale.mace.enchant:
    description: Allows enchanting/anviling maces (bypasses the lock). OPs have this by default.
    default: op
